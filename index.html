<body>
<div class="container">

  <div class="header">
    <span class="emoji-big">🎓</span>
    <h1>Tra Cứu Điểm Thi<br>Tuyển Sinh Lớp 10 Đà Nẵng 2026</h1>
    <p>Nhập SBD để xem điểm + gợi ý trường + AI nhận xét 👇</p>
  </div>

  <div class="card">
    <div class="input-group">
      <input type="text" id="sbdInput" placeholder="Nhập số báo danh..." maxlength="10"
        onkeydown="if(event.key==='Enter') search()">
      <button class="btn-search" id="btnSearch" onclick="search()">🔍 Tra cứu</button>
    </div>
  </div>

  <div id="thuKhoaCard">
    <div class="thu-khoa-header">
      <span style="font-size:22px">🏆</span>
      <span class="tk-title">Thủ Khoa 2026</span>
      <select class="tk-mode-select" id="tkModeSelect" onchange="renderThuKhoa()">
        <option value="dai_tra">🏫 Đại trà</option>
        <option value="chuyen">⭐ Chuyên</option>
        <option value="ptdtnt">🌿 PTDTNT</option>
      </select>
    </div>
    <div class="tk-list" id="tkList">
      <div style="text-align:center;color:#aaa;padding:16px;font-size:14px">⏳ Đang tải dữ liệu...</div>
    </div>
  </div>

  <div class="card" id="result">
    <div id="resultContent"></div>
  </div>

  <div class="footer">Dữ liệu từ Sở GD&ĐT Đà Nẵng • AI nhận xét mang tính tham khảo</div>
</div>

<script>
// ================================================
// KHÔNG CÓ API KEY Ở ĐÂY
// Mọi request AI đều đi qua /api/ai (Vercel)
// ================================================

let diemThiData   = null;
let diemChuanData = null;

async function loadData() {
  try {
    const [r1, r2] = await Promise.all([
      fetch("diem-thi-lop10-danang-2026.json"),
      fetch("diem-chuan-danang-2026.json")
    ]);
    const j1 = await r1.json();
    const j2 = await r2.json();

    const arr = Array.isArray(j1) ? j1 : (j1.du_lieu ?? []);
    diemThiData = {};
    arr.forEach(item => {
      diemThiData[String(item.so_bao_danh).trim()] = item;
    });

    diemChuanData = j2;
    console.log("✅ Loaded", Object.keys(diemThiData).length, "thí sinh");
    renderThuKhoa();
  } catch(e) {
    console.error("❌ Lỗi load data:", e);
    document.getElementById("tkList").innerHTML =
      `<div style="text-align:center;color:#ef4444;padding:16px;font-size:14px">❌ Không tải được dữ liệu</div>`;
  }
}
loadData();

// ========== THỦ KHOA ==========
function renderThuKhoa() {
  if (!diemThiData) return;

  const mode    = document.getElementById("tkModeSelect").value;
  const medals  = ["🥇","🥈","🥉"];
  const classes = ["rank1","rank2","rank3"];
  const labels  = ["Thủ khoa","Á khoa","Hạng Ba"];

  const tongField = mode === "chuyen"  ? "tong_chuyen"
                  : mode === "ptdtnt" ? "tong_ptdtnt"
                  : "tong_dai_tra";

  const modeLabel = mode === "chuyen"  ? "tổng chuyên"
                  : mode === "ptdtnt" ? "tổng PTDTNT"
                  : "đại trà";

  const sorted = Object.values(diemThiData)
    .filter(ts => ts[tongField] != null)
    .map(ts => ({
      sbd:        String(ts.so_bao_danh),
      ten:        ts.ho_ten ?? "—",
      van:        ts.ngu_van,
      nn:         ts.ngoai_ngu,
      toan:       ts.toan,
      mon_chuyen: ts.mon_chuyen,
      tong:       ts[tongField]
    }))
    .sort((a,b) => b.tong - a.tong)
    .slice(0,3);

  if (sorted.length === 0) {
    document.getElementById("tkList").innerHTML =
      `<div style="text-align:center;color:#aaa;padding:16px;font-size:14px">Không có dữ liệu cho loại này</div>`;
    return;
  }

  const html = sorted.map((ts,i) => `
    <div class="tk-item ${classes[i]} pop" style="animation-delay:${i*0.12}s">
      <div class="tk-medal">${medals[i]}</div>
      <div class="tk-info">
        <div class="tk-sbd">SBD: ${ts.sbd}</div>
        <div class="tk-name">${ts.ten} &nbsp;•&nbsp; ${labels[i]}</div>
        <div class="tk-details">
          <span class="tk-tag">📖 Văn: ${ts.van ?? "—"}</span>
          <span class="tk-tag">🌐 NN: ${ts.nn ?? "—"}</span>
          <span class="tk-tag">📐 Toán: ${ts.toan ?? "—"}</span>
          ${ts.mon_chuyen != null ? `<span class="tk-tag">⭐ Chuyên: ${ts.mon_chuyen}</span>` : ""}
        </div>
      </div>
      <div class="tk-score-box">
        <div class="tk-score">${ts.tong}</div>
        <div class="tk-score-label">${modeLabel}</div>
      </div>
    </div>`).join("");

  document.getElementById("tkList").innerHTML = html;
}

function hideThuKhoa() {
  document.getElementById("thuKhoaCard").classList.add("hidden");
}

// ========== XẾP HẠNG ==========
function tinhRank(tongDaiTra) {
  if (!diemThiData) return { rank:"?", total:"?" };
  const all = Object.values(diemThiData)
    .map(d => d.tong_dai_tra ?? 0)
    .sort((a,b) => b-a);
  const rank = all.findIndex(d => d <= tongDaiTra) + 1;
  return { rank, total: all.length };
}

function tinhRankChuyen(tongChuyen) {
  if (!diemThiData || tongChuyen == null) return null;
  const all = Object.values(diemThiData)
    .filter(d => d.tong_chuyen != null)
    .map(d => d.tong_chuyen)
    .sort((a,b) => b-a);
  if (all.length === 0) return null;
  const rank = all.findIndex(d => d <= tongChuyen) + 1;
  return { rank, total: all.length };
}

function tinhRankPTDTNT(tongPt) {
  if (!diemThiData || tongPt == null) return null;
  const all = Object.values(diemThiData)
    .filter(d => d.tong_ptdtnt != null)
    .map(d => d.tong_ptdtnt)
    .sort((a,b) => b-a);
  if (all.length === 0) return null;
  const rank = all.findIndex(d => d <= tongPt) + 1;
  return { rank, total: all.length };
}

// ========== GỢI Ý TRƯỜNG ==========
function goiYTruong(tongDaiTra) {
  if (!diemChuanData?.phu_luc_4_cong_lap) return { dau:[], sat:[], kho:[] };
  const dau=[], sat=[], kho=[];

  diemChuanData.phu_luc_4_cong_lap.forEach(t => {
    const dc = t.diem_chuan;
    if (!dc) return;
    const diff = Math.round((tongDaiTra - dc) * 100) / 100;
    const obj  = { ten: t.ten_truong, dc, diff };

    if (diff >= 0)      dau.push(obj);
    else if (diff > -1) sat.push(obj);
    else                kho.push(obj);
  });

  dau.sort((a,b) => b.dc - a.dc);
  sat.sort((a,b) => b.diff - a.diff);
  kho.sort((a,b) => b.diff - a.diff);

  return { dau, sat, kho };
}

// ========== BẢNG CHUYÊN ==========
function renderBangChuyen(tongChuyen) {
  if (!diemChuanData?.phu_luc_1_chuyen || tongChuyen == null) return "";
  const rows = diemChuanData.phu_luc_1_chuyen.map(lop => {
    const truongs = [
      { ten:"Lê Quý Đôn",    dc: lop.Le_Quy_Don },
      { ten:"N.Bỉnh Khiêm",  dc: lop.Nguyen_Binh_Khiem },
      { ten:"Lê Thánh Tông", dc: lop.Le_Thanh_Tong }
    ];
    const tds = truongs.map(t => {
      if (!t.dc) return `<td>—</td>`;
      const diff  = Math.round((tongChuyen - t.dc) * 100) / 100;
      const style = diff >= 0
        ? ' style="color:#16a34a;font-weight:800"'
        : diff > -2 ? ' style="color:#f59e0b;font-weight:700"' : '';
      const icon  = diff >= 0 ? "✅" : diff > -2 ? "⚡" : "";
      return `<td class="dc"${style}>${t.dc} ${icon}</td>`;
    }).join("");
    return `<tr><td style="text-align:left;font-weight:600">${lop.lop_chuyen}</td>${tds}</tr>`;
  }).join("");

  return `
    <div class="section-title">🎯 So sánh điểm chuyên (tổng chuyên: <strong>${tongChuyen}</strong>)</div>
    <div style="overflow-x:auto;margin-bottom:8px">
      <table class="chuyen-table">
        <thead><tr>
          <th>Lớp chuyên</th>
          <th>Lê Quý Đôn</th>
          <th>N.Bỉnh Khiêm</th>
          <th>Lê Thánh Tông</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="font-size:12px;color:#888;margin-bottom:16px">✅ Đủ điểm &nbsp;⚡ Sát trong 2 điểm</p>`;
}

// ========== PTDTNT ==========
function renderPTDTNT(tongPt) {
  if (!diemChuanData?.phu_luc_2_ptdtnt || tongPt == null) return "";
  const rows = diemChuanData.phu_luc_2_ptdtnt.map(obj => {
    const diff = Math.round((tongPt - obj.diem_chuan) * 100) / 100;
    const cls  = diff >= 0 ? "dau" : diff > -1 ? "sat" : "kho";
    const icon = diff >= 0 ? "✅" : diff > -1 ? "⚡" : "❌";
    const txt  = diff >= 0 ? "Đủ điều kiện" : diff > -1 ? "Sát sao" : "Chưa đủ";
    return `<div class="school-item ${cls}" style="margin-bottom:8px">
      <div><div class="school-name">${obj.doi_tuong}</div>
      <div class="school-meta">Điểm chuẩn PTDTNT: ${obj.diem_chuan}</div></div>
      <span class="school-badge">${icon} ${txt}</span>
    </div>`;
  }).join("");
  return `<div class="section-title">🏫 Trường PTDTNT Quảng Nam (tổng: ${tongPt})</div>${rows}`;
}

// ========== BUILD INFO CHO AI ==========
function buildChuyenInfoForAI(tongChuyen) {
  if (!diemChuanData?.phu_luc_1_chuyen || tongChuyen == null) return "";
  const lines = diemChuanData.phu_luc_1_chuyen.map(lop => {
    const truongs = [
      { ten: "Lê Quý Đôn",        dc: lop.Le_Quy_Don },
      { ten: "Nguyễn Bỉnh Khiêm", dc: lop.Nguyen_Binh_Khiem },
      { ten: "Lê Thánh Tông",     dc: lop.Le_Thanh_Tong }
    ];
    const parts = truongs
      .filter(t => t.dc != null)
      .map(t => {
        const diff   = Math.round((tongChuyen - t.dc) * 100) / 100;
        const trang  = diff >= 0 ? "ĐẬU ✅" : diff > -2 ? "SÁT ⚡" : "TRƯỢT ❌";
        return `${t.ten}: chuẩn ${t.dc} → ${trang} (${diff >= 0 ? "+" : ""}${diff})`;
      });
    return `  ${lop.lop_chuyen}: ${parts.join(" | ")}`;
  });
  return `\nĐiểm chuẩn các lớp chuyên (so với tổng chuyên ${tongChuyen} của thí sinh):\n${lines.join("\n")}`;
}

function buildPTDTNTInfoForAI(tongPt) {
  if (!diemChuanData?.phu_luc_2_ptdtnt || tongPt == null) return "";
  const lines = diemChuanData.phu_luc_2_ptdtnt.map(obj => {
    const diff  = Math.round((tongPt - obj.diem_chuan) * 100) / 100;
    const trang = diff >= 0 ? "ĐỦ ĐIỀU KIỆN ✅" : diff > -1 ? "SÁT ⚡" : "CHƯA ĐỦ ❌";
    return `  ${obj.doi_tuong}: chuẩn ${obj.diem_chuan} → ${trang} (${diff >= 0 ? "+" : ""}${diff})`;
  });
  return `\nĐiểm chuẩn PTDTNT (so với tổng PTDTNT ${tongPt} của thí sinh):\n${lines.join("\n")}`;
}

// ========== AI — GỌI QUA /api/ai TRÊN VERCEL ==========
// KHÔNG CÓ API KEY, ENDPOINT AI, HAY SECRET NÀO Ở ĐÂY
async function goiAI(info) {
  const {
    sbd, ten, van, nn, toan, mon_chuyen, diem_kk, diem_ut, diem_qd,
    tong_dai_tra, tong_chuyen, tong_ptdtnt, rank, total,
    truongDau, truongSat, truongKho, chuyenInfo, ptdtntInfo
  } = info;

  const prompt = `Bạn là AI cà khịa nhưng vẫn động viên học sinh vừa tra điểm thi tuyển sinh lớp 10 Đà Nẵng 2026.

Thông tin thí sinh ${ten} (SBD: ${sbd}):
- Điểm Ngữ Văn: ${van ?? "Vắng"}
- Điểm Ngoại Ngữ: ${nn ?? "Vắng"}
- Điểm Toán: ${toan ?? "Vắng"}
${mon_chuyen != null ? `- Điểm môn chuyên: ${mon_chuyen}` : ""}
${diem_kk    != null ? `- Điểm khuyến khích: ${diem_kk}` : ""}
${diem_ut    != null ? `- Điểm ưu tiên: ${diem_ut}` : ""}
${diem_qd    != null ? `- Điểm quy đổi (KQHT-RL): ${diem_qd}` : ""}
- Tổng điểm đại trà: ${tong_dai_tra}
${tong_chuyen  != null ? `- Tổng điểm chuyên: ${tong_chuyen}` : ""}
${tong_ptdtnt  != null ? `- Tổng điểm PTDTNT: ${tong_ptdtnt}` : ""}
- Xếp hạng: Top ${rank}/${total} thí sinh toàn thành phố
- Trường có thể đậu: ${truongDau.slice(0,3).map(t=>t.ten).join(", ") || "chưa rõ"}
- Trường sát sao: ${truongSat.slice(0,2).map(t=>t.ten).join(", ") || "không có"}
${chuyenInfo}${ptdtntInfo}

Hãy viết 3-5 câu: cà khịa hài hước GenZ nhưng có động viên, nhận xét điểm từng môn, nếu có thi chuyên thì nhận xét khả năng đậu lớp chuyên nào, nhận xét trường công lập khả năng đậu/sát/khó, chúc mừng hoặc an ủi. Dùng tiếng Việt tự nhiên, có thể dùng emoji. KHÔNG dùng markdown.`;

  // Chỉ gọi /api/ai — Vercel sẽ ký HMAC và chuyển tiếp sang Railway
  return fetch("/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [{ role: "user", content: prompt }],
      max_tokens: 50000,
    }),
  });
}

// ========== SEARCH ==========
async function search() {
  const sbd = document.getElementById("sbdInput").value.trim();
  if (!sbd) return;
  if (!diemThiData) { alert("Đang tải dữ liệu, thử lại!"); return; }

  const btn = document.getElementById("btnSearch");
  btn.disabled = true; btn.textContent = "⏳ Đang tìm...";
  hideThuKhoa();

  const resultDiv  = document.getElementById("result");
  const contentDiv = document.getElementById("resultContent");
  resultDiv.style.display = "block";

  const ts = diemThiData[sbd]
           ?? diemThiData[sbd.padStart(5,"0")]
           ?? null;

  if (!ts) {
    contentDiv.innerHTML = `<div class="not-found">😅 Không tìm thấy SBD <strong>${sbd}</strong><br><small>Kiểm tra lại số báo danh nhé!</small></div>`;
    btn.disabled=false; btn.textContent="🔍 Tra cứu";
    return;
  }

  const van        = ts.ngu_van;
  const nn         = ts.ngoai_ngu;
  const toan       = ts.toan;
  const mon_chuyen = ts.mon_chuyen;
  const diem_kk    = ts.diem_kk;
  const diem_ut    = ts.diem_uu_tien;
  const diem_qd    = ts.diem_quy_doi;
  const tong_dt    = ts.tong_dai_tra;
  const tong_pt    = ts.tong_ptdtnt;
  const tong_cv    = ts.tong_chuyen;

  const { rank, total }   = tinhRank(tong_dt ?? 0);
  const rankChuyen        = tinhRankChuyen(tong_cv);
  const rankPTDTNT        = tinhRankPTDTNT(tong_pt);
  const { dau, sat, kho } = goiYTruong(tong_dt ?? 0);

  // --- Score boxes ---
  const boxes = [];
  boxes.push(`<div class="score-box van pop"><div class="mon">Ngữ Văn</div><div class="diem">${van ?? "—"}</div><div class="label">điểm</div></div>`);
  boxes.push(`<div class="score-box nn pop"><div class="mon">Ngoại Ngữ</div><div class="diem">${nn ?? "—"}</div><div class="label">điểm</div></div>`);
  boxes.push(`<div class="score-box toan pop"><div class="mon">Toán</div><div class="diem">${toan ?? "—"}</div><div class="label">điểm</div></div>`);
  if (mon_chuyen != null) boxes.push(`<div class="score-box chuyen pop"><div class="mon">Môn Chuyên</div><div class="diem">${mon_chuyen}</div><div class="label">điểm</div></div>`);
  if (diem_kk    != null) boxes.push(`<div class="score-box kk pop"><div class="mon">Khuyến Khích</div><div class="diem">${diem_kk}</div><div class="label">điểm</div></div>`);
  if (diem_ut    != null) boxes.push(`<div class="score-box ut pop"><div class="mon">Ưu Tiên</div><div class="diem">${diem_ut}</div><div class="label">điểm</div></div>`);

  const colsCls = boxes.length <= 3 ? "cols-3" : "cols-4";

  // --- KQHT-RL ---
  const qdBox = diem_qd != null ? `
    <div class="qd-box pop">
      <div class="qd-left">
        <div class="qd-label">📋 Điểm Quy Đổi KQHT – RL</div>
        <div class="qd-sub">Kết quả học tập &amp; rèn luyện 4 năm học</div>
      </div>
      <div class="qd-score">${diem_qd}</div>
    </div>` : "";

  // --- Tổng điểm ---
  let tongHtml = `<div class="tong-section">`;
  if (tong_dt != null)
    tongHtml += `<div class="total-box dai-tra pop"><div class="total-label">🏫 TỔNG ĐIỂM ĐẠI TRÀ</div><div class="total-score">${tong_dt}</div></div>`;
  if (tong_pt != null)
    tongHtml += `<div class="total-box ptdtnt pop"><div class="total-label">🌿 TỔNG ĐIỂM PTDTNT</div><div class="total-score">${tong_pt}</div></div>`;
  if (tong_cv != null)
    tongHtml += `<div class="total-box chuyen pop"><div class="total-label">⭐ TỔNG ĐIỂM CHUYÊN</div><div class="total-score">${tong_cv}</div></div>`;
  tongHtml += `</div>`;

  // --- Rank ---
  const rankIcon = rank<=10?"🏆":rank<=50?"🥈":rank<=200?"🥉":"📊";
  const pct      = Math.round((1 - rank / total) * 100);

  let rankRowsHtml = `
    <div class="rank-row">
      <div class="rank-icon">${rankIcon}</div>
      <div>
        <div class="rank-text">🏫 Top ${rank} / ${total} thí sinh đại trà toàn thành phố</div>
        <div class="rank-sub">Cao hơn ${pct}% thí sinh 📈</div>
      </div>
    </div>`;

  if (rankChuyen) {
    const pctC = Math.round((1 - rankChuyen.rank / rankChuyen.total) * 100);
    rankRowsHtml += `<hr class="rank-divider">
    <div class="rank-row">
      <div class="rank-icon">⭐</div>
      <div>
        <div class="rank-text">Top ${rankChuyen.rank} / ${rankChuyen.total} thí sinh thi chuyên</div>
        <div class="rank-sub">Cao hơn ${pctC}% thí sinh chuyên 📈</div>
      </div>
    </div>`;
  }

  if (rankPTDTNT) {
    const pctP = Math.round((1 - rankPTDTNT.rank / rankPTDTNT.total) * 100);
    rankRowsHtml += `<hr class="rank-divider">
    <div class="rank-row">
      <div class="rank-icon">🌿</div>
      <div>
        <div class="rank-text">Top ${rankPTDTNT.rank} / ${rankPTDTNT.total} thí sinh thi PTDTNT</div>
        <div class="rank-sub">Cao hơn ${pctP}% thí sinh PTDTNT 📈</div>
      </div>
    </div>`;
  }

  function schoolList(arr, cls, badge) {
    return arr.slice(0,4).map(s => {
      const diffStr = s.diff === 0
        ? "Bằng điểm chuẩn"
        : s.diff > 0
          ? `Hơn ${s.diff} điểm`
          : `Thiếu ${Math.abs(s.diff)} điểm`;
      return `
        <div class="school-item ${cls}">
          <div><div class="school-name">${s.ten}</div>
          <div class="school-meta">Điểm chuẩn 2026: ${s.dc} &nbsp;•&nbsp; ${diffStr}</div></div>
          <span class="school-badge">${badge}</span>
        </div>`;
    }).join("");
  }

  contentDiv.innerHTML = `
    <div class="student-header">
      <div class="avatar">🎒</div>
      <div class="student-info">
        <h2>${ts.ho_ten ?? "Thí sinh"}</h2>
        <span class="sbd-tag">SBD: ${ts.so_bao_danh} • Kết quả thi Lớp 10 Đà Nẵng 2026</span>
      </div>
    </div>

    <div class="scores-grid ${colsCls}">${boxes.join("")}</div>
    ${qdBox}
    ${tongHtml}

    <div class="rank-box pop">${rankRowsHtml}</div>

    <div class="ai-box">
      <div class="ai-label">🤖 AI NHẬN XÉT</div>
      <div class="ai-text" id="aiText">
        <div class="ai-typing"><span></span><span></span><span></span></div>
      </div>
    </div>

    ${renderBangChuyen(tong_cv)}
    ${renderPTDTNT(tong_pt)}

    ${dau.length>0 ? `<div class="section-title">🟢 Trường công lập có thể đậu</div>${schoolList(dau,"dau","✅ Khả năng cao")}` : ""}
    ${sat.length>0 ? `<div class="section-title">🟡 Sát sao (dưới 1 điểm)</div>${schoolList(sat,"sat","⚡ Cần theo dõi")}` : ""}
    ${kho.length>0 ? `<div class="section-title">🔴 Khó đậu hơn</div>${schoolList(kho.slice(0,4),"kho","❌ Cần cân nhắc")}` : ""}
  `;

  // --- AI streaming ---
  try {
    const chuyenInfo  = buildChuyenInfoForAI(tong_cv);
    const ptdtntInfo  = buildPTDTNTInfoForAI(tong_pt);

    const res = await goiAI({
      sbd: ts.so_bao_danh, ten: ts.ho_ten, van, nn, toan,
      mon_chuyen, diem_kk, diem_ut, diem_qd,
      tong_dai_tra: tong_dt, tong_chuyen: tong_cv, tong_ptdtnt: tong_pt,
      rank, total,
      truongDau: dau, truongSat: sat, truongKho: kho,
      chuyenInfo, ptdtntInfo
    });

    // Xử lý lỗi từ server (rate limit, auth, v.v.)
    if (!res.ok) {
      let errMsg = "😅 AI đang bận, thử lại sau nhé!";
      try {
        const errJson = await res.json();
        if (errJson?.message) errMsg = `⚠️ ${errJson.message}`;
      } catch {}
      document.getElementById("aiText").innerHTML = errMsg;
      btn.disabled=false; btn.textContent="🔍 Tra cứu";
      resultDiv.scrollIntoView({ behavior:"smooth", block:"start" });
      return;
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    const aiEl    = document.getElementById("aiText");
    aiEl.innerHTML = "";
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") break;
        try {
          const json  = JSON.parse(data);
          const chunk = json.choices?.[0]?.delta?.content ?? "";
          aiEl.innerHTML += chunk.replace(/\n/g,"<br>");
        } catch {}
      }
    }
  } catch(e) {
    document.getElementById("aiText").innerHTML = "😅 AI đang bận, thử lại sau nhé!";
  }

  btn.disabled=false; btn.textContent="🔍 Tra cứu";
  resultDiv.scrollIntoView({ behavior:"smooth", block:"start" });
}
</script>
